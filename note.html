<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KyZXEAg3QhqLMpG8r+8fhAXLRk2vvoC2f3B09zVXn8CA5QIVfZOJ3BCsw2P0p/We" crossorigin="anonymous">
    <title>Yuto's Note</title>
  </head>
  <body>
    <header>
      <!--導覽列-->
      <script type="text/javascript" src="navbar.js"></script>
      <!--導覽列結束-->
    </header>

    <article class="container py-3">
      <div>
        <h1>JS備忘錄</h1>
        <hr>
        <p>參考資料:<a href="https://www.youtube.com/watch?v=1pYtVwIAvhY&t=9545s" class="link-primary">【前端速成】JavaScript JS 快速入門｜Tiktok工程師帶你入門前端｜布魯斯前端</a></p>
      </div>
        <div class="card">
            <div class="card-header"><h3 class="pt-2">備忘錄</h3></div>
            <div class="card-body mx-2">
                <div class="py-2">標題: 
                    <input class="form-control" type="text" id="title"/>
                </div>
                <div class="py-2">內容: 
                    <textarea class="form-control" type="text" id="content" rows="3"></textarea>
                </div>
                <p><div>
                    <button type="button" class="btn btn-success" id="addedBtn">新增</button>  
                    <button type="button" class="btn btn-danger" id="deletedBtn">刪除最後一個</button>
                </div></p>
            </div>
        </div>

        <div class="py-2">
            <div class="list" id="list">
                <!--<div class="card">
                    <div class="card-header"></div>
                    <div class="card-body">
                      <p class="card-text"></p>
                    </div>
                    <div class="card-footer text-muted"></div>
                </div>-->
            </div>
        </div>

    </article>

    <script src="./note.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-U1DAWAznBHeqEIlVSCgzq+c9gqGAJn5c/t99JyeKa9xxaYpSvHU5awsuZVVFIhvj" crossorigin="anonymous"></script>
  </body>
</html>
